<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect | Tasnimul Hossain</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* এনিমেটেড ব্যাকগ্রাউন্ড */
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .contact-container {
            position: relative;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            padding: 50px 30px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
            z-index: 1;
        }

        /* প্রোফাইল পিকচার গ্লো ইফেক্ট */
        .profile-box {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 20px;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid rgba(255, 255, 255, 0.5);
            transition: 0.5s;
        }

        .profile-box::after {
            content: '';
            position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            border-radius: 50%;
            background: linear-gradient(45deg, #fb0094, #0000ff, #00ff00, #ffff00, #ff0000, #fb0094);
            background-size: 400%;
            z-index: -1;
            filter: blur(10px);
            animation: borderGlow 20s linear infinite;
        }

        @keyframes borderGlow {
            0% { background-position: 0 0; }
            50% { background-position: 400% 0; }
            100% { background-position: 0 0; }
        }

        h2 { color: #fff; font-size: 2rem; font-weight: 700; margin-bottom: 5px; text-shadow: 0 2px 10px rgba(0,0,0,0.2); }
        .subtitle { color: rgba(255,255,255,0.8); font-size: 0.9rem; margin-bottom: 30px; letter-spacing: 2px; text-transform: uppercase; }

        /* সোশ্যাল বাটন ডিজাইন */
        .social-links { display: flex; flex-direction: column; gap: 15px; }

        .btn-link {
            display: flex;
            align-items: center;
            padding: 15px 25px;
            border-radius: 20px;
            text-decoration: none;
            color: #fff;
            font-weight: 600;
            font-size: 1.1rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.4s;
            position: relative;
            overflow: hidden;
        }

        .btn-link:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .btn-link i { margin-right: 15px; font-size: 1.4rem; width: 30px; text-align: center; }

        /* স্পেসিফিক কালার গ্লো */
        .facebook:hover { box-shadow: 0 0 20px #1877f2; }
        .instagram:hover { box-shadow: 0 0 20px #e1306c; }
        .linkedin:hover { box-shadow: 0 0 20px #0077b5; }
        .snapchat:hover { box-shadow: 0 0 20px #fffc00; color: #fffc00; }
        .skype:hover { box-shadow: 0 0 20px #00aff0; }

        .back-home {
            margin-top: 30px;
            display: inline-block;
            color: #fff;
            text-decoration: none;
            font-size: 0.9rem;
            opacity: 0.7;
            transition: 0.3s;
        }
        .back-home:hover { opacity: 1; letter-spacing: 1px; }

        /* মোবাইল স্ক্রিন সেটিংস */
        @media (max-width: 480px) {
            .contact-container { padding: 30px 20px; }
            h2 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="contact-container">
        <div class="profile-box">
            <img src="My.jpeg" alt="Tasnimul Hossain" class="profile-img">
        </div>
        
        <h2>Tasnimul Hossain</h2>
        <p class="subtitle">Stay Connected</p>

        <div class="social-links">
            <a href="https://www.facebook.com/tasnimul.hossain.scout" target="_blank" class="btn-link facebook">
                <i class="fab fa-facebook"></i> Facebook
            </a>
            <a href="https://www.instagram.com/tasnimul.scout" target="_blank" class="btn-link instagram">
                <i class="fab fa-instagram"></i> Instagram
            </a>
            <a href="https://www.linkedin.com/in/tasnimul-hossain" target="_blank" class="btn-link linkedin">
                <i class="fab fa-linkedin-in"></i> LinkedIn
            </a>
            <a href="https://www.snapchat.com/add/tasnimul.scouts" target="_blank" class="btn-link snapchat">
                <i class="fab fa-snapchat-ghost"></i> Snapchat
            </a>
            <a href="skype:tasnimul.bhalo.nei?chat" class="btn-link skype">
                <i class="fab fa-skype"></i> Skype
            </a>
        </div>

        <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
        
        <p style="margin-top: 20px; color: rgba(255,255,255,0.5); font-size: 0.8rem;">
            +880 1827-621209
        </p>
    </div>

</body>
</html>
