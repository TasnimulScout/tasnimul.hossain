<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect | Tasnimul Hossain</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
        }

        /* কার্সার ক্যানভাস স্টাইল */
        #cursor-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .contact-container {
            position: relative;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            padding: 50px 30px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
            animation: fadeIn 0.8s ease-out;
            z-index: 1;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-box {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 20px;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid rgba(255, 255, 255, 0.5);
            transition: 0.5s;
        }

        .profile-box::after {
            content: '';
            position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            border-radius: 50%;
            background: linear-gradient(45deg, #fb0094, #0000ff, #00ff00, #ffff00, #ff0000, #fb0094);
            background-size: 400%;
            z-index: -1;
            filter: blur(10px);
            animation: borderGlow 20s linear infinite;
        }

        @keyframes borderGlow {
            0% { background-position: 0 0; }
            50% { background-position: 400% 0; }
            100% { background-position: 0 0; }
        }

        h2 { color: #fff; font-size: 2rem; font-weight: 700; margin-bottom: 5px; }
        .subtitle { color: rgba(255,255,255,0.8); font-size: 0.9rem; margin-bottom: 30px; letter-spacing: 2px; text-transform: uppercase; }

        .social-links { display: flex; flex-direction: column; gap: 15px; }

        .btn-link {
            display: flex;
            align-items: center;
            padding: 15px 25px;
            border-radius: 20px;
            text-decoration: none;
            color: #fff;
            font-weight: 600;
            font-size: 1.1rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.4s;
        }

        .btn-link:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .btn-link i { margin-right: 15px; font-size: 1.4rem; width: 30px; text-align: center; }

        .facebook:hover { box-shadow: 0 0 20px #1877f2; }
        .instagram:hover { box-shadow: 0 0 20px #e1306c; }
        .linkedin:hover { box-shadow: 0 0 20px #0077b5; }
        .snapchat:hover { box-shadow: 0 0 20px #fffc00; color: #fffc00; }
        
        .contact-actions {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .action-btn {
            color: #fff;
            font-size: 1.5rem;
            text-decoration: none;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .action-btn span { font-size: 0.7rem; font-weight: 400; opacity: 0.8; }
        .action-btn:hover { transform: translateY(-5px); }
        .whatsapp-icon:hover { color: #25D366; filter: drop-shadow(0 0 10px #25D366); }
        .phone-icon:hover { color: #34b7f1; filter: drop-shadow(0 0 10px #34b7f1); }

        .back-home {
            margin-top: 25px;
            display: inline-block;
            color: #fff;
            text-decoration: none;
            font-size: 0.9rem;
            opacity: 0.6;
            transition: 0.3s;
        }
        .back-home:hover { opacity: 1; letter-spacing: 1px; }
    </style>
</head>
<body>

    <canvas id="cursor-canvas"></canvas>

    <div class="contact-container">
        <div class="profile-box">
            <img src="My.jpeg" alt="Tasnimul Hossain" class="profile-img">
        </div>
        
        <h2>Tasnimul Hossain</h2>
        <p class="subtitle">Stay Connected</p>

        <div class="social-links">
            <a href="https://www.facebook.com/tasnimul.hossain.scout" target="_blank" class="btn-link facebook">
                <i class="fab fa-facebook"></i> Facebook
            </a>
            <a href="https://www.instagram.com/tasnimul.scout" target="_blank" class="btn-link instagram">
                <i class="fab fa-instagram"></i> Instagram
            </a>
            <a href="https://www.linkedin.com/in/tasnimul-hossain" target="_blank" class="btn-link linkedin">
                <i class="fab fa-linkedin-in"></i> LinkedIn
            </a>
            <a href="https://www.snapchat.com/add/tasnimul.scouts" target="_blank" class="btn-link snapchat">
                <i class="fab fa-snapchat-ghost"></i> Snapchat
            </a>
        </div>

        <div class="contact-actions">
            <a href="tel:+8801827621209" class="action-btn phone-icon" title="Direct Call">
                <i class="fas fa-phone-alt"></i>
                <span>Call</span>
            </a>
            <a href="https://wa.me/8801827621209" target="_blank" class="action-btn whatsapp-icon" title="WhatsApp Me">
                <i class="fab fa-whatsapp"></i>
                <span>WhatsApp</span>
            </a>
        </div>

        <a href="index.html" class="back-home"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
        
        <p style="margin-top: 15px; color: rgba(255,255,255,0.4); font-size: 0.75rem;">
            © 2026 Tasnimul Hossain
        </p>
    </div>

    <script>
        const canvas = document.getElementById('cursor-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 5 + 1;
                this.speedX = Math.random() * 3 - 1.5;
                this.speedY = Math.random() * 3 - 1.5;
                // গ্লাস মরফিজম থিমের সাথে মিল রেখে সাদা কণা দেওয়া হয়েছে
                this.color = `rgba(255, 255, 255, ${Math.random() * 0.5})`; 
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.size > 0.2) this.size -= 0.1;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        window.addEventListener('mousemove', (e) => {
            for (let i = 0; i < 5; i++) {
                particles.push(new Particle(e.clientX, e.clientY));
            }
        });

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].size <= 0.2) {
                    particles.splice(i, 1);
                    i--;
                }
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>

</body>
</html>
